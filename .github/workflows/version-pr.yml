name: Version PR

on:
  workflow_call:
    secrets:
      VERSION_APP_ID:
        required: true
      VERSION_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  version-artifact:
    if: github.ref_name == 'main' || github.ref_name == 'next'
    name: Version packages
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.pending-changesets.outputs.has_changesets }}
    env:
      CI: true
      HUSKY: 0
      TARGET_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending-changesets
        run: node scripts/release/detect-pending-changesets.mjs

      - name: Stop if there is nothing to version
        if: steps.pending-changesets.outputs.has_changesets == 'false'
        run: echo "No pending changesets; no version PR needed."

      - name: Enter next prerelease mode
        if: env.TARGET_BRANCH == 'next' && steps.pending-changesets.outputs.has_changesets == 'true' && hashFiles('.changeset/pre.json') == ''
        run: pnpm changeset pre enter next

      - name: Refuse prerelease mode on main
        if: env.TARGET_BRANCH == 'main' && hashFiles('.changeset/pre.json') != ''
        run: |
          echo "::error::.changeset/pre.json is present on main. Run pnpm changeset pre exit and commit the result before stable releases."
          exit 1

      - name: Generate Changelog GitHub App Token
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        id: changelog-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.VERSION_APP_ID }}
          private-key: ${{ secrets.VERSION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read

      - name: Version packages
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: pnpm run version
        env:
          # @changesets/changelog-github reads GitHub PR metadata through
          # GITHUB_TOKEN. Keep this token read-only; anything loaded by
          # `pnpm run version` can read it from process.env.
          GITHUB_TOKEN: ${{ steps.changelog-token.outputs.token }}

      - name: Write version artifact
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: |
          set -euo pipefail
          node scripts/release/write-version-artifact.mjs "${RUNNER_TEMP}/version-artifact/version-changes.json"

      - name: Upload version artifact
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: version-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/version-artifact/version-changes.json
          if-no-files-found: error
          retention-days: 1

  version-pr:
    name: Version PR
    needs: version-artifact
    if: needs.version-artifact.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      TARGET_BRANCH: ${{ github.ref_name }}
      RELEASE_BRANCH: changeset-release/${{ github.ref_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Download version artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/version-artifact

      - name: Apply version artifact
        run: |
          set -euo pipefail
          node scripts/release/apply-version-artifact.mjs < "${RUNNER_TEMP}/version-artifact/version-changes.json"

      - name: Verify write-token preconditions
        shell: bash
        run: |
          set -euo pipefail

          unexpected_hook=""
          if [ -d .git/hooks ]; then
            unexpected_hook="$(find .git/hooks -type f ! -name '*.sample' -print -quit)"
          fi
          if [ -n "${unexpected_hook}" ]; then
            echo "::error::Unexpected git hooks were created before the write-token steps."
            find .git/hooks -type f ! -name '*.sample' -print
            exit 1
          fi

      - name: Generate Release GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.VERSION_APP_ID }}
          private-key: ${{ secrets.VERSION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create signed version commit
        id: version-commit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: ${{ env.RELEASE_BRANCH }}
        run: |
          set -euo pipefail

          unexpected_hook=""
          if [ -d .git/hooks ]; then
            unexpected_hook="$(find .git/hooks -type f ! -name '*.sample' -print -quit)"
          fi
          if [ -n "${unexpected_hook}" ]; then
            echo "::error::Unexpected git hook before signed version commit."
            find .git/hooks -type f ! -name '*.sample' -print
            exit 1
          fi

          node scripts/release/create-version-commit.mjs

      - name: Open or update release PR
        if: steps.version-commit.outputs.has_version_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: ${{ env.RELEASE_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        run: |
          set -euo pipefail

          unexpected_hook=""
          if [ -d .git/hooks ]; then
            unexpected_hook="$(find .git/hooks -type f ! -name '*.sample' -print -quit)"
          fi
          if [ -n "${unexpected_hook}" ]; then
            echo "::error::Unexpected git hook before release PR update."
            find .git/hooks -type f ! -name '*.sample' -print
            exit 1
          fi

          title="chore: version packages (${TARGET_BRANCH})"
          body="$(cat <<BODY
          This PR applies the pending changesets for ${TARGET_BRANCH}.

          Merging it clears the consumed changesets and lets the publish workflow publish the already-versioned packages.
          BODY
          )"

          pr_number="$(gh pr list \
            --base "${TARGET_BRANCH}" \
            --head "${RELEASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" --title "${title}" --body "${body}"
          else
            gh pr create \
              --base "${TARGET_BRANCH}" \
              --head "${RELEASE_BRANCH}" \
              --title "${title}" \
              --body "${body}"
          fi
