name: Version PR

on:
  workflow_call:
    inputs:
      target_branch:
        required: false
        type: string
      checkout_ref:
        required: false
        type: string
    secrets:
      VERSION_APP_ID:
        required: true
      VERSION_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target_branch || github.ref }}-version-pr
  cancel-in-progress: false

jobs:
  version-pr:
    if: ${{ (inputs.target_branch || github.ref_name) == 'main' || (inputs.target_branch || github.ref_name) == 'next' }}
    name: Version PR
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      TARGET_BRANCH: ${{ inputs.target_branch || github.ref_name }}
      RELEASE_BRANCH: changeset-release/${{ inputs.target_branch || github.ref_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkout_ref || inputs.target_branch || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          shopt -s nullglob

          pending=()
          for changeset in .changeset/*.md; do
            if [ "$(basename "$changeset")" != "README.md" ]; then
              pending+=("$changeset")
            fi
          done

          if [ "${#pending[@]}" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets:"
            printf '%s\n' "${pending[@]}"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if there is nothing to version
        if: steps.pending-changesets.outputs.has_changesets == 'false'
        run: echo "No pending changesets; no version PR needed."

      - name: Enter next prerelease mode
        if: env.TARGET_BRANCH == 'next' && steps.pending-changesets.outputs.has_changesets == 'true' && hashFiles('.changeset/pre.json') == ''
        run: pnpm changeset pre enter next

      - name: Refuse prerelease mode on main
        if: env.TARGET_BRANCH == 'main' && hashFiles('.changeset/pre.json') != ''
        run: |
          echo "::error::.changeset/pre.json is present on main. Run pnpm changeset pre exit and commit the result before stable releases."
          exit 1

      - name: Version packages
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: pnpm run version

      - name: Generate GitHub App Token
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.VERSION_APP_ID }}
          private-key: ${{ secrets.VERSION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Push release branch
        id: version-commit
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          is_allowed_version_path() {
            [[ "$1" =~ ^packages/[^/]+/package\.json$ ]] ||
            [[ "$1" =~ ^\.changeset/[^/]+\.md$ ]] ||
            [[ "$1" == ".changeset/pre.json" ]]
          }

          allowed_changed=()
          while IFS= read -r -d '' path; do
            if is_allowed_version_path "$path"; then
              allowed_changed+=("$path")
            fi
          done < <(git diff --name-only -z)

          while IFS= read -r -d '' path; do
            if is_allowed_version_path "$path"; then
              allowed_changed+=("$path")
            fi
          done < <(git ls-files --others --exclude-standard -z)

          if [ "${#allowed_changed[@]}" -gt 0 ]; then
            git add -- "${allowed_changed[@]}"
          fi

          staged_violations=()
          while IFS= read -r -d '' path; do
            if ! is_allowed_version_path "$path"; then
              staged_violations+=("$path")
            fi
          done < <(git diff --cached --name-only -z)

          if [ "${#staged_violations[@]}" -gt 0 ]; then
            echo "::error::Versioning staged files outside the release allowlist:"
            printf '  %s\n' "${staged_violations[@]}"
            exit 1
          fi

          unstaged=()
          while IFS= read -r -d '' path; do
            unstaged+=("$path")
          done < <(git diff --name-only -z)

          untracked=()
          while IFS= read -r -d '' path; do
            untracked+=("$path")
          done < <(git ls-files --others --exclude-standard -z)

          if [ "${#unstaged[@]}" -gt 0 ] || [ "${#untracked[@]}" -gt 0 ]; then
            echo "::error::Versioning produced files outside the release allowlist:"
            printf '  %s\n' "${unstaged[@]}" "${untracked[@]}"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No version changes to commit."
            echo "has_version_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: version packages"

          remote_release_ref="refs/heads/${RELEASE_BRANCH}"
          local_release_ref="refs/remotes/origin/${RELEASE_BRANCH}"
          if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "+${remote_release_ref}:${local_release_ref}"
            expected_sha="$(git rev-parse "${local_release_ref}")"
            git push --force-with-lease="${remote_release_ref}:${expected_sha}" origin "HEAD:${remote_release_ref}"
          else
            git push origin "HEAD:${remote_release_ref}"
          fi

          echo "has_version_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open or update release PR
        if: steps.version-commit.outputs.has_version_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_BRANCH: ${{ inputs.target_branch || github.ref_name }}
        run: |
          set -euo pipefail

          title="chore: version packages (${BASE_BRANCH})"
          body="$(cat <<BODY
          This PR applies the pending changesets for ${BASE_BRANCH}.

          Merging it clears the consumed changesets and lets the publish workflow publish the already-versioned packages.
          BODY
          )"

          pr_number="$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${RELEASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" --title "${title}" --body "${body}"
          else
            gh pr create \
              --base "${BASE_BRANCH}" \
              --head "${RELEASE_BRANCH}" \
              --title "${title}" \
              --body "${body}"
          fi
