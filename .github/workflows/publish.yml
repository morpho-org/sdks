name: Publish

on:
  workflow_call:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_name == 'main' || github.ref_name == 'next'
    name: Publish
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      TARGET_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@morpho-org'

      # Trusted publishing requires npm >= 11.5.1, but Node 22.22.2's bundled npm 10.9.7
      # currently fails to self-upgrade directly to npm@latest with MODULE_NOT_FOUND
      # (missing promise-retry). Pin a known-good npm 11 release instead.
      - run: npm install -g npm@11.11.0

      - run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          shopt -s nullglob

          pending=()
          for changeset in .changeset/*.md; do
            if [ "$(basename "$changeset")" != "README.md" ]; then
              pending+=("$changeset")
            fi
          done

          if [ "${#pending[@]}" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets:"
            printf '%s\n' "${pending[@]}"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until version PR is merged
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: |
          echo "Pending changesets are present. The version PR workflow will prepare a release branch; skipping publish."

      - name: Refuse prerelease mode on main
        if: env.TARGET_BRANCH == 'main' && hashFiles('.changeset/pre.json') != ''
        run: |
          echo "::error::.changeset/pre.json is present on main. Run pnpm changeset pre exit and commit the result before stable releases."
          exit 1

      - name: Publish packages
        id: publish-packages
        if: steps.pending-changesets.outputs.has_changesets == 'false'
        shell: bash
        run: |
          set -euo pipefail

          publish_tag="latest"
          if [ "${TARGET_BRANCH}" = "next" ]; then
            publish_tag="next"
          fi

          before_tags="$(mktemp)"
          after_tags="$(mktemp)"
          new_tags="${RUNNER_TEMP}/new-package-tags.txt"
          trap 'rm -f "$before_tags" "$after_tags"' EXIT

          git tag --list | LC_ALL=C sort > "$before_tags"
          pnpm release --tag "$publish_tag"
          git tag --list | LC_ALL=C sort > "$after_tags"

          LC_ALL=C comm -13 "$before_tags" "$after_tags" > "$new_tags"
          if [ -s "$new_tags" ]; then
            echo "has_tags=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tags=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push package tags
        if: steps.publish-packages.outputs.has_tags == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t tags < "${RUNNER_TEMP}/new-package-tags.txt"
          refs=()

          for tag in "${tags[@]}"; do
            refs+=("refs/tags/${tag}")
          done

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --atomic origin "${refs[@]}"

      # This only creates releases for tags made by this publish run. If npm and
      # tag push succeed but release creation fails, reruns need manual repair.
      - name: Create GitHub releases
        if: steps.publish-packages.outputs.has_tags == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t tags < "${RUNNER_TEMP}/new-package-tags.txt"
          releases_dir="${RUNNER_TEMP}/github-releases"
          mkdir -p "${releases_dir}"

          prerelease_args=()
          if [ "${TARGET_BRANCH}" = "next" ]; then
            prerelease_args=(--prerelease)
          fi

          for tag in "${tags[@]}"; do
            body_file="${releases_dir}/${tag//\//__}.md"

            node --input-type=module - "${tag}" "${body_file}" <<'NODE'
          import { existsSync, readFileSync, readdirSync, writeFileSync } from "node:fs";
          import { join } from "node:path";

          const [, , tag, bodyFile] = process.argv;
          const packages = [];

          for (const entry of readdirSync("packages", { withFileTypes: true })) {
            if (!entry.isDirectory()) continue;

            const packageJsonPath = join("packages", entry.name, "package.json");
            if (!existsSync(packageJsonPath)) continue;

            const packageJson = JSON.parse(readFileSync(packageJsonPath, "utf8"));
            packages.push({
              name: packageJson.name,
              changelogPath: join("packages", entry.name, "CHANGELOG.md"),
            });
          }

          packages.sort((left, right) => right.name.length - left.name.length);

          let matchedPackage;
          let version;
          for (const candidate of packages) {
            for (const separator of ["@", "-v"]) {
              const prefix = `${candidate.name}${separator}`;
              if (tag.startsWith(prefix)) {
                matchedPackage = candidate;
                version = tag.slice(prefix.length);
                break;
              }
            }

            if (matchedPackage != null) break;
          }

          if (matchedPackage == null || version == null) {
            throw new Error(`Cannot map tag "${tag}" to a package.`);
          }

          if (!existsSync(matchedPackage.changelogPath)) {
            throw new Error(`Cannot find a changelog for "${matchedPackage.name}".`);
          }

          const changelog = readFileSync(matchedPackage.changelogPath, "utf8");
          const heading = new RegExp(`^##\\s+${escapeRegExp(version)}(?:\\s|$).*`, "m");
          const match = heading.exec(changelog);
          if (match == null) {
            throw new Error(`Cannot find version "${version}" in ${matchedPackage.changelogPath}.`);
          }

          const sectionStart = match.index;
          const sectionTail = changelog.slice(sectionStart + match[0].length);
          const nextSection = sectionTail.search(/^##\s+/m);
          const sectionEnd =
            nextSection === -1
              ? changelog.length
              : sectionStart + match[0].length + nextSection;
          const section = changelog.slice(sectionStart, sectionEnd).trim();

          writeFileSync(bodyFile, `${section}\n`);

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }
          NODE

            if gh release view "${tag}" >/dev/null 2>&1; then
              gh release edit "${tag}" --title "${tag}" --notes-file "${body_file}" "${prerelease_args[@]}"
            else
              gh release create "${tag}" --title "${tag}" --notes-file "${body_file}" "${prerelease_args[@]}"
            fi
          done
