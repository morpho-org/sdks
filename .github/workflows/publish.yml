name: Publish

on:
  workflow_call:

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        package:
          - test
          - test-wagmi

          - morpho-ts
          - morpho-test

          - blue-sdk
          - blue-sdk-viem
          - blue-sdk-wagmi

          - simulation-sdk
          - simulation-sdk-wagmi

          - bundler-sdk-viem

          - liquidation-sdk-viem
          - liquidity-sdk-viem

          - migration-sdk-viem

    name: "@morpho-org/${{ matrix.package }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch all history so that we can determine the version to release.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@morpho-org'

      - name: Select npm version for trusted publishing
        id: npm-version
        run: |
          case "$(node -p "process.versions.node.split('.')[0]")" in
            22)
              echo 'version=11.11.1' >> "$GITHUB_OUTPUT"
              ;;
            24)
              echo 'version=latest' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported Node.js version for trusted publishing: $(node -v)" >&2
              exit 1
              ;;
          esac

      # Trusted publishing requires npm >= 11.5.1.
      # Node 22.22.2's bundled npm 10.9.7 currently fails to self-upgrade to npm 11.12.x
      # with MODULE_NOT_FOUND (missing promise-retry), so keep Node 22 on the newest
      # working npm (11.11.1). Node 24's bundled npm 11.11.0 can upgrade to npm@latest.
      - run: npm install -g npm@${{ steps.npm-version.outputs.version }}

      - run: pnpm install --frozen-lockfile

      - id: release
        run: node ../../scripts/release/release.js
        working-directory: packages/${{ matrix.package }}

      # Set version of each package to the most recent so they are referenced correctly in dependencies.
      - run: |
          pnpm -r -c exec 'node ../../scripts/release/version.js'
        if: steps.release.outputs.version

      - run: pnpm publish --no-git-checks --access public --tag ${{ steps.release.outputs.channel }}
        working-directory: packages/${{ matrix.package }}
        if: steps.release.outputs.version

      - run: gh release create ${{ steps.release.outputs.tag }} --target ${{ steps.release.outputs.branch }} --notes-file packages/${{ matrix.package }}/CHANGELOG.md --title '${{ steps.release.outputs.tag }}' ${{ steps.release.outputs.channel == 'latest' && '--latest' || '--prerelease' }}
        if: steps.release.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: echo "- [RELEASE] ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        if: steps.release.outputs.version

