name: Publish

on:
  workflow_call:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@morpho-org'

      # Trusted publishing requires npm >= 11.5.1, but Node 22.22.2's bundled npm 10.9.7
      # currently fails to self-upgrade directly to npm@latest with MODULE_NOT_FOUND
      # (missing promise-retry). Pin a known-good npm 11 release instead.
      - run: npm install -g npm@11.11.0

      - run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          shopt -s nullglob

          pending=()
          for changeset in .changeset/*.md; do
            if [ "$(basename "$changeset")" != "README.md" ]; then
              pending+=("$changeset")
            fi
          done

          if [ "${#pending[@]}" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets:"
            printf '%s\n' "${pending[@]}"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enter next prerelease mode
        if: github.ref_name == 'next' && steps.pending-changesets.outputs.has_changesets == 'true' && hashFiles('.changeset/pre.json') == ''
        run: pnpm changeset pre enter next

      - name: Version packages
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: pnpm run version

      - name: Commit version changes
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        env:
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync } = require("node:fs");

          const main = async () => {
            const exec = (command, args) =>
              execFileSync(command, args, { encoding: "utf8" }).trim();

            execFileSync("git", ["add", "."]);

            const diff = execFileSync("git", [
              "diff",
              "--cached",
              "--name-status",
              "-z",
            ]);

            if (diff.length === 0) {
              console.log("No version changes to commit.");
              return;
            }

            const fields = diff.toString("utf8").split("\0").filter(Boolean);
            const additions = [];
            const deletions = [];

            for (let i = 0; i < fields.length; ) {
              const status = fields[i++];

              if (status.startsWith("R")) {
                const oldPath = fields[i++];
                const newPath = fields[i++];

                deletions.push({ path: oldPath });
                additions.push({
                  path: newPath,
                  contents: readFileSync(newPath, "base64"),
                });
                continue;
              }

              const path = fields[i++];
              if (status === "D") {
                deletions.push({ path });
              } else {
                additions.push({
                  path,
                  contents: readFileSync(path, "base64"),
                });
              }
            }

            const expectedHeadOid = exec("git", ["rev-parse", "HEAD"]);
            const query = `
              mutation CreateVersionCommit($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit {
                    oid
                    url
                  }
                }
              }
            `;

            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                authorization: `Bearer ${process.env.GH_TOKEN}`,
                "content-type": "application/json",
                "x-github-api-version": "2022-11-28",
              },
              body: JSON.stringify({
                query,
                variables: {
                  input: {
                    branch: {
                      repositoryNameWithOwner: process.env.GITHUB_REPOSITORY,
                      branchName: process.env.BRANCH,
                    },
                    expectedHeadOid,
                    message: {
                      headline: "chore: version packages",
                    },
                    fileChanges: {
                      additions,
                      deletions,
                    },
                  },
                },
              }),
            });

            const result = await response.json();
            if (!response.ok || result.errors) {
              console.error(JSON.stringify(result, null, 2));
              process.exit(1);
            }

            const commit = result.data.createCommitOnBranch.commit;
            console.log(`Created ${commit.url}`);
          };

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Publish packages
        if: steps.pending-changesets.outputs.has_changesets == 'false'
        shell: bash
        run: |
          publish_tag="latest"
          if [ "${GITHUB_REF_NAME}" = "next" ]; then
            publish_tag="next"
          fi

          git tag --list | sort > /tmp/tags-before
          pnpm release --tag "$publish_tag"
          git tag --list | sort > /tmp/tags-after

          comm -13 /tmp/tags-before /tmp/tags-after > /tmp/new-tags
          if [ -s /tmp/new-tags ]; then
            while IFS= read -r tag; do
              git push origin "refs/tags/${tag}"
            done < /tmp/new-tags
          fi
