name: Publish

on:
  workflow_call:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_name == 'main' || github.ref_name == 'next'
    name: Publish
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@morpho-org'

      # Trusted publishing requires npm >= 11.5.1, but Node 22.22.2's bundled npm 10.9.7
      # currently fails to self-upgrade directly to npm@latest with MODULE_NOT_FOUND
      # (missing promise-retry). Pin a known-good npm 11 release instead.
      - run: npm install -g npm@11.11.0

      - run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          shopt -s nullglob

          pending=()
          for changeset in .changeset/*.md; do
            if [ "$(basename "$changeset")" != "README.md" ]; then
              pending+=("$changeset")
            fi
          done

          if [ "${#pending[@]}" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets:"
            printf '%s\n' "${pending[@]}"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until version PR is merged
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: |
          echo "Pending changesets are present. The version PR workflow will prepare a release branch; skipping publish."

      - name: Refuse prerelease mode on main
        if: github.ref_name == 'main' && hashFiles('.changeset/pre.json') != ''
        run: |
          echo "::error::.changeset/pre.json is present on main. Run pnpm changeset pre exit and commit the result before stable releases."
          exit 1

      - name: Publish packages
        if: steps.pending-changesets.outputs.has_changesets == 'false'
        shell: bash
        run: |
          publish_tag="latest"
          if [ "${GITHUB_REF_NAME}" = "next" ]; then
            publish_tag="next"
          fi

          before_tags="$(mktemp)"
          after_tags="$(mktemp)"
          new_tags="$(mktemp)"
          trap 'rm -f "$before_tags" "$after_tags" "$new_tags"' EXIT

          git tag --list | sort > "$before_tags"
          pnpm release --tag "$publish_tag"
          git tag --list | sort > "$after_tags"

          comm -13 "$before_tags" "$after_tags" > "$new_tags"
          if [ -s "$new_tags" ]; then
            mapfile -t tags < "$new_tags"
            refs=()

            for tag in "${tags[@]}"; do
              refs+=("refs/tags/${tag}")
            done

            git push --atomic origin "${refs[@]}"
          fi
