name: Release

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release.
        required: true
        default: main
        type: choice
        options:
          - main
          - next

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  release-lint:
    name: Lint (${{ matrix.branch }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.branch)) || fromJSON('["main","next"]') }}

    uses: ./.github/workflows/lint.yml
    with:
      checkout_ref: ${{ matrix.branch }}

  release-build:
    name: Build (${{ matrix.branch }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.branch)) || fromJSON('["main","next"]') }}

    uses: ./.github/workflows/build.yml
    with:
      checkout_ref: ${{ matrix.branch }}

  release-test:
    name: Test (${{ matrix.branch }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.branch)) || fromJSON('["main","next"]') }}

    uses: ./.github/workflows/test.yml
    with:
      checkout_ref: ${{ matrix.branch }}
    secrets:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}

  version-pr:
    name: Version PR (${{ matrix.branch }})

    permissions:
      contents: read

    needs:
      - release-lint
      - release-build
      - release-test

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.branch)) || fromJSON('["main","next"]') }}

    uses: ./.github/workflows/version-pr.yml
    with:
      target_branch: ${{ matrix.branch }}
    secrets:
      VERSION_APP_ID: ${{ secrets.VERSION_APP_ID }}
      VERSION_APP_PRIVATE_KEY: ${{ secrets.VERSION_APP_PRIVATE_KEY }}

  publish:
    name: Publish (${{ matrix.branch }})

    permissions:
      contents: write
      id-token: write

    needs:
      - release-lint
      - release-build
      - release-test
      - version-pr

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.branch)) || fromJSON('["main","next"]') }}

    uses: ./.github/workflows/publish.yml
    with:
      target_branch: ${{ matrix.branch }}
