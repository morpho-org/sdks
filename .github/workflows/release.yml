name: Release

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release.
        required: true
        default: main
        type: choice
        options:
          - main
          - next

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  resolve-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Resolve main
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      sha: ${{ steps.ref.outputs.sha }}

    steps:
      - id: ref
        shell: bash
        env:
          BRANCH: main
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          sha="$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${BRANCH}" | cut -f1)"
          if [ -z "${sha}" ]; then
            echo "::error::Could not resolve ${BRANCH}"
            exit 1
          fi

          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  lint-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Lint (main)

    permissions:
      contents: read

    needs:
      - resolve-main

    uses: ./.github/workflows/lint.yml
    with:
      checkout_ref: ${{ needs.resolve-main.outputs.sha }}

  build-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Build (main)

    permissions:
      contents: read

    needs:
      - resolve-main

    uses: ./.github/workflows/build.yml
    with:
      checkout_ref: ${{ needs.resolve-main.outputs.sha }}

  test-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Test (main)

    permissions:
      contents: read

    needs:
      - resolve-main

    uses: ./.github/workflows/test.yml
    with:
      checkout_ref: ${{ needs.resolve-main.outputs.sha }}
    secrets:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}

  version-pr-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Version PR (main)

    permissions:
      contents: read

    needs:
      - resolve-main
      - lint-main
      - build-main
      - test-main

    uses: ./.github/workflows/version-pr.yml
    with:
      target_branch: main
      checkout_ref: ${{ needs.resolve-main.outputs.sha }}
    secrets:
      VERSION_APP_ID: ${{ secrets.VERSION_APP_ID }}
      VERSION_APP_PRIVATE_KEY: ${{ secrets.VERSION_APP_PRIVATE_KEY }}

  publish-main:
    if: github.event_name == 'schedule' || inputs.branch == 'main'
    name: Publish (main)

    permissions:
      contents: write
      id-token: write

    needs:
      - resolve-main
      - lint-main
      - build-main
      - test-main
      - version-pr-main

    uses: ./.github/workflows/publish.yml
    with:
      target_branch: main
      checkout_ref: ${{ needs.resolve-main.outputs.sha }}

  resolve-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Resolve next
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      sha: ${{ steps.ref.outputs.sha }}

    steps:
      - id: ref
        shell: bash
        env:
          BRANCH: next
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          sha="$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${BRANCH}" | cut -f1)"
          if [ -z "${sha}" ]; then
            echo "::error::Could not resolve ${BRANCH}"
            exit 1
          fi

          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  lint-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Lint (next)

    permissions:
      contents: read

    needs:
      - resolve-next

    uses: ./.github/workflows/lint.yml
    with:
      checkout_ref: ${{ needs.resolve-next.outputs.sha }}

  build-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Build (next)

    permissions:
      contents: read

    needs:
      - resolve-next

    uses: ./.github/workflows/build.yml
    with:
      checkout_ref: ${{ needs.resolve-next.outputs.sha }}

  test-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Test (next)

    permissions:
      contents: read

    needs:
      - resolve-next

    uses: ./.github/workflows/test.yml
    with:
      checkout_ref: ${{ needs.resolve-next.outputs.sha }}
    secrets:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}

  version-pr-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Version PR (next)

    permissions:
      contents: read

    needs:
      - resolve-next
      - lint-next
      - build-next
      - test-next

    uses: ./.github/workflows/version-pr.yml
    with:
      target_branch: next
      checkout_ref: ${{ needs.resolve-next.outputs.sha }}
    secrets:
      VERSION_APP_ID: ${{ secrets.VERSION_APP_ID }}
      VERSION_APP_PRIVATE_KEY: ${{ secrets.VERSION_APP_PRIVATE_KEY }}

  publish-next:
    if: github.event_name == 'schedule' || inputs.branch == 'next'
    name: Publish (next)

    permissions:
      contents: write
      id-token: write

    needs:
      - resolve-next
      - lint-next
      - build-next
      - test-next
      - version-pr-next

    uses: ./.github/workflows/publish.yml
    with:
      target_branch: next
      checkout_ref: ${{ needs.resolve-next.outputs.sha }}
