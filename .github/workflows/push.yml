name: Release

on:
  push:
    branches:
      - '**'
      # create-version-commit.mjs uses a short-lived API staging branch because
      # GitHub's createCommitOnBranch mutation needs a branch ref to create the
      # GitHub-signed version commit. The workflow moves the real release branch
      # to that commit afterward, so skip CI/release runs for main/next staging.
      - '!changeset-release/main-api-commit-*'
      - '!changeset-release/next-api-commit-*'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' && github.ref_name != 'next' }}

jobs:
  lint:
    permissions:
      contents: read

    uses: ./.github/workflows/lint.yml

  build:
    permissions:
      contents: read

    uses: ./.github/workflows/build.yml

  test:
    permissions:
      contents: read

    uses: ./.github/workflows/test.yml
    secrets:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}

  version-pr:
    if: github.ref_name == 'main' || github.ref_name == 'next'

    permissions:
      contents: read

    needs:
      - lint
      - build
      - test

    uses: ./.github/workflows/version-pr.yml
    secrets:
      VERSION_APP_ID: ${{ secrets.VERSION_APP_ID }}
      VERSION_APP_PRIVATE_KEY: ${{ secrets.VERSION_APP_PRIVATE_KEY }}

  publish:
    if: github.ref_name == 'main' || github.ref_name == 'next'

    permissions:
      contents: write
      id-token: write

    needs:
      - lint
      - build
      - test
      - version-pr

    uses: ./.github/workflows/publish.yml
