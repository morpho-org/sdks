name: Test

on:
  workflow_call:
    secrets:
      MAINNET_RPC_URL:
        required: true
      BASE_RPC_URL:
        required: true
      ARBITRUM_RPC_URL:
        required: true

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore Foundry cache
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
          restore-keys: foundry-${{ github.job }}-

      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          cache: false # Disable built-in cache to always save it.

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:ci
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          IS_LOGGING_DISABLED: true

      - name: Save Foundry cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
