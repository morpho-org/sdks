name: Test

on:
  workflow_call:
    secrets:
      MAINNET_RPC_URL:
        required: true
      BASE_RPC_URL:
        required: true
      ARBITRUM_RPC_URL:
        required: true

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore Foundry cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
          restore-keys: foundry-${{ github.job }}-

      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          cache: false # Disable built-in cache to always save it.

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test --coverage
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          IS_LOGGING_DISABLED: true

      # The wdk-protocol-lending-morpho-evm package still runs on jest (Phase 1
      # of TIB-2026-05-18). Its tests are not picked up by the root vitest
      # project, so they run in a dedicated step here. The unit suite is pure
      # node; the e2e fork suite skips itself when MAINNET_RPC_URL is unset.
      # Workspace `@morpho-org/*` deps are resolved to their built `lib/esm`
      # output via the package's jest moduleNameMapper, so we build them first.
      - name: Build dependencies for wdk-protocol-lending-morpho-evm
        run: pnpm --filter "@morpho-org/wdk-protocol-lending-morpho-evm^..." build

      - name: Run wdk-protocol-lending-morpho-evm tests
        run: pnpm --filter @morpho-org/wdk-protocol-lending-morpho-evm test
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          IS_LOGGING_DISABLED: true

      - name: Save Foundry cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
