name: Test

on:
  workflow_call:
    secrets:
      MAINNET_RPC_URL:
        required: true
      BASE_RPC_URL:
        required: true
      ARBITRUM_RPC_URL:
        required: true

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore Foundry cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
          restore-keys: foundry-${{ github.job }}-

      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          cache: false # Disable built-in cache to always save it.

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:ci
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          IS_LOGGING_DISABLED: true

      - name: Save Foundry cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-${{ github.job }}-${{ github.sha }}
